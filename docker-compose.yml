# DevClip Self-Hosted License + Sync Server
# Complete deployment stack for Enterprise self-hosting
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. Generate license keys: cd server && node scripts/cli/license-cli.mjs generate-keys
#   3. docker-compose up -d
#   4. Access at http://localhost:8787

services:
  # PostgreSQL database for multi-tenant sync
  postgres:
    image: postgres:16-alpine
    container_name: devclip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-devclip}
      POSTGRES_PASSWORD: ${PGPASSWORD:-change_me_in_env}
      POSTGRES_DB: ${PGDATABASE:-devclip}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "${PGPORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-devclip} -d ${PGDATABASE:-devclip}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devclip-network

  # DevClip License + Sync Server
  devclip-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: devclip-server
    restart: unless-stopped
    environment:
      # Server configuration
      PORT: "8787"
      HOST: "0.0.0.0"
      NODE_ENV: "production"

      # Database connection
      DATABASE_URL: "postgresql://${PGUSER:-devclip}:${PGPASSWORD:-change_me_in_env}@postgres:5432/${PGDATABASE:-devclip}"

      # Security
      JWT_SECRET: ${JWT_SECRET:-generate_a_secure_random_string}
      AUDIT_SECRET: ${AUDIT_SECRET:-generate_a_secure_random_string}

      # License signing keys (required for offline license generation)
      LICENSE_PRIVATE_KEY: ${LICENSE_PRIVATE_KEY}
      LICENSE_PUBLIC_KEY: ${LICENSE_PUBLIC_KEY}

      # Optional: Additional valid keys beyond dc_pro_/dc_ent_ prefixes
      # DEVCLIP_EXTRA_ENTERPRISE_KEYS: "org-secret-key-1,org-secret-key-2"
      # DEVCLIP_EXTRA_PRO_KEYS: "team-key-1,team-key-2"

      # Email/SMTP (optional - for notifications)
      # SMTP_HOST: ""
      # SMTP_PORT: "587"
      # SMTP_USER: ""
      # SMTP_PASS: ""

      # External APIs (optional - for hosted AI features)
      # OPENAI_API_KEY: ""
      # ANTHROPIC_API_KEY: ""

      # Sync/WebSocket settings
      WS_HEARTBEAT_INTERVAL: "30000"
      WS_MAX_CONNECTIONS_PER_USER: "5"
      SYNC_RATE_LIMIT_PER_MINUTE: "60"

    ports:
      - "${DEVCLIP_PORT:-8787}:8787"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount for license keys if using file-based secrets
      - ./secrets:/app/secrets:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - devclip-network

  # Optional: Redis for session caching and rate limiting
  # Uncomment if you need distributed caching or high-throughput rate limiting
  # redis:
  #   image: redis:7-alpine
  #   container_name: devclip-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis_data:/data
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - devclip-network

  # Optional: Nginx reverse proxy with SSL termination
  # Uncomment for production deployments with SSL
  # nginx:
  #   image: nginx:alpine
  #   container_name: devclip-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - devclip-server
  #   networks:
  #     - devclip-network

volumes:
  postgres_data:
    driver: local
  # redis_data:
  #   driver: local

networks:
  devclip-network:
    driver: bridge
