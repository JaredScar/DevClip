appId: com.devclip.app
productName: DevClip
directories:
  # Make app directory explicit so electron-builder doesn't mis-resolve projectDir/appDir paths.
  app: .
  output: release
  buildResources: build
files:
  - dist/**/*
  - angular-app/dist/**/*
  - package.json
extraResources:
  - from: database/schema.sql
    to: schema.sql
win:
  target: nsis
  icon: devclip_icon_transparent.png

mac:
  icon: devclip_icon_transparent.png

linux:
  icon: devclip_icon_transparent.png
