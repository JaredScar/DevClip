name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install root dependencies (Electron + native)
        run: npm ci
      - name: Install Angular app dependencies
        working-directory: angular-app
        run: npm ci
      - name: Build Electron + Angular
        run: npm run build:all

  server:
    name: Server build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        run: npm ci
      - name: Syntax check server entry point
        run: node --input-type=module --check < src/index.mjs
