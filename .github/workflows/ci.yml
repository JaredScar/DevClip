name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install root dependencies (Electron + native)
        run: npm ci
      - name: Install Angular app dependencies
        working-directory: angular-app
        run: npm ci
      - name: Build Electron + Angular
        run: npm run build:all
