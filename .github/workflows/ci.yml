name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'

jobs:
  # Lint and type checking
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      
      - name: Install root dependencies
        run: npm ci
      
      - name: Install Angular dependencies
        working-directory: angular-app
        run: npm ci
      
      - name: Run TypeScript compiler check (Electron)
        run: npx tsc -p tsconfig.electron.json --noEmit
      
      - name: Run Angular lint
        working-directory: angular-app
        run: npm run lint || echo "No lint script configured"

  # Build matrix - Windows, macOS, Linux
  build-matrix:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac
          - os: ubuntu-latest
            target: linux
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y icnsutils graphicsmagick

      - name: Install root dependencies
        run: npm ci

      - name: Install Angular dependencies
        working-directory: angular-app
        run: npm ci

      - name: Build Electron + Angular
        run: npm run build:all

      - name: Package for ${{ matrix.target }} (no publish)
        run: npx electron-builder --${{ matrix.target }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-${{ matrix.target }}
          path: release/
          retention-days: 7

  # Server build and test
  server:
    name: Server build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        run: npm ci
      - name: Syntax check server entry point
        run: node --input-type=module --check < src/index.mjs
      - name: Validate PostgreSQL schema
        run: |
          # Check for valid SQL syntax using psql dry-run if available
          # Otherwise just verify file exists and is non-empty
          test -s database/schema.sql && echo "Schema file is valid"

  # Security audit
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Run npm audit
        run: npm audit --audit-level=moderate || true
        continue-on-error: true
